<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer | Focus</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="timer-message">Please select a timer before starting.</div>

    <div class="container">
      <div class="timer">
        <h1>⏰ Pomodoro Timer</h1>

        <div class="tab-container">
          <button class="tab-button active" id="tab-timer">Timer</button>
          <button class="tab-button" id="tab-stats">Usage Stats</button>
        </div>

        <section id="timer-view">
          <div class="control-panel">
            <button id="music-toggle" class="control-button">Mute Music</button>
            <label for="alarm-select" class="alarm-label">Alarm Sound:</label>
            <select id="alarm-select" class="alarm-select">
              <option value="fart">Fart</option>
              <option value="vine">Vine boom</option>
              <option value="bell">Bell</option>
            </select>
            <button id="preview-alarm" class="control-button">
              Preview Alarm
            </button>
            <button id="toggle-timer-visibility" class="control-button">
              Hide Timer
            </button>
          </div>

          <div class="button-container">
            <button class="button" id="pomodoro-session">Pomodoro</button>
            <button class="button" id="short-break">Short Break</button>
            <button class="button" id="long-break">Long Break</button>
          </div>

          <main id="timer-main">
            <div class="pomodoro">
              <div
                id="pomodoro-timer"
                class="timer-display"
                data-duration="25.00"
              >
                <h1 class="time">25:00</h1>
              </div>

              <div id="short-timer" class="timer-display" data-duration="5.00">
                <h1 class="time">5:00</h1>
              </div>

              <div id="long-timer" class="timer-display" data-duration="10.00">
                <h1 class="time">10:00</h1>
              </div>
            </div>
          </main>

          <div class="buttons">
            <button id="start">START</button>
            <button id="stop">STOP</button>
          </div>
        </section>

        <section id="stats-view" class="hidden-view">
          <div class="stats-card">
            <h2>Usage Summary</h2>
            <p>This Week: <span id="weekly-usage">0m</span></p>
            <p>This Month: <span id="monthly-usage">0m</span></p>
          </div>

          <div class="stats-card">
            <h2>Daily Usage (Last 30 Days)</h2>
            <table class="stats-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time Used</th>
                </tr>
              </thead>
              <tbody id="stats-history"></tbody>
            </table>
          </div>
        </section>

        <div id="youtube-players" aria-hidden="true">
          <div id="bg-music-player"></div>
          <div id="alarm-player"></div>
        </div>
      </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- JS -->
    <script src="script.js"></script>
  </body>
</html>
