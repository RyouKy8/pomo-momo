<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer | Focus</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="timer-message">Please select a timer before starting.</div>

    <div class="container">
      <div class="timer">
        <div class="timer-header">
          <h1>😒 Pomodoro Timer</h1>
          <button id="settings-btn" title="Adjust Timer Durations">⚙️</button>
        </div>

        <div class="button-container">
          <button class="button" id="pomodoro-session">Pomodoro</button>
          <button class="button" id="short-break">Short Break</button>
          <button class="button" id="long-break">Long Break</button>
        </div>

        <main>
          <div class="pomodoro">
            <div
              id="pomodoro-timer"
              class="timer-display"
              data-duration="25.00"
            >
              <h1 class="time">25:00</h1>
            </div>

            <div id="short-timer" class="timer-display" data-duration="5.00">
              <h1 class="time">5:00</h1>
            </div>

            <div id="long-timer" class="timer-display" data-duration="10.00">
              <h1 class="time">10:00</h1>
            </div>
          </div>
        </main>

        <div class="buttons">
          <button id="start">START</button>
          <button id="stop">STOP</button>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <h2>Timer Settings</h2>
        <div class="setting-row">
          <label for="pomodoro-input">Pomodoro (minutes)</label>
          <input
            type="number"
            id="pomodoro-input"
            min="1"
            max="99"
            value="25"
          />
        </div>
        <div class="setting-row">
          <label for="short-input">Short Break (minutes)</label>
          <input type="number" id="short-input" min="1" max="99" value="5" />
        </div>
        <div class="setting-row">
          <label for="long-input">Long Break (minutes)</label>
          <input type="number" id="long-input" min="1" max="99" value="10" />
        </div>
        <div class="modal-buttons">
          <button id="apply-settings">Apply</button>
          <button id="close-settings">Cancel</button>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
  </body>
</html>
